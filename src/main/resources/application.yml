server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: microservice-customer
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/microservice-customer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  config:
    import: "optional:consul:"
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:19092}
        bindings:
          customerEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: customer.dlq
      bindings:
        customerEvents-out-0:
          destination: customer
          content-type: application/json
        customerEvents-in-0:
          destination: customer
          group: ${spring.application.name}-group
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: microservice-customer
        instance-id: ${spring.application.name}:${server.port}
