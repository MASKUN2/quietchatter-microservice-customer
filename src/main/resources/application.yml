server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: microservice-customer
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/microservice-customer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  config:
    import: "optional:consul:"
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: microservice-customer
        instance-id: ${spring.application.name}:${server.port}
